name: AI-Labor Paradox CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Lint with flake8
      run: |
        pip install flake8
        flake8 prototype/backend --count --select=E9,F63,F7,F82 --show-source --statistics

  frontend-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Node
      uses: actions/setup-node@v3
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: prototype/frontend/package-lock.json
    - name: Install Dependencies
      run: |
        cd prototype/frontend
        npm install --legacy-peer-deps
    - name: Build
      run: |
        cd prototype/frontend
        npm run build
