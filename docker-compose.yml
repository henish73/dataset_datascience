services:
  backend:
    build: 
      context: ./prototype/backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data/processed:/app/data/processed
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build:
      context: ./prototype/frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:8000
